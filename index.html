<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> امتياز - الحديث التحليلي</title>
    <style>
        :root { 
            --primary: #1e4d2b; --accent: #c5a059; --success: #27ae60; --light: #fdfdfd;
            --bg-body: #f0f2f0; --bg-container: #ffffff; --text-main: #333333;
            --input-bg: #ffffff; --input-border: #eeeeee;
        }
        body.dark-mode {
            --bg-body: #121212; --bg-container: #1e1e1e; --text-main: #e0e0e0;
            --input-bg: #2d2d2d; --input-border: #444444; --primary: #7ee2a8;
            --accent: #d8b36a;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-body); 
            color: var(--text-main); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; transition: 0.3s; 
        }
        .container { 
            background: var(--bg-container); width: 100%; max-width: 700px; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-bottom: 20px; border-top: 5px solid var(--accent); position: relative; 
            display: flex; flex-direction: column;
        }

        .header-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
            width: 100%;
        }
        
        .lang-dropdown {
            position: absolute;
            top: 15px;
            left: 15px;
            display: inline-block;
            z-index: 100;
        }
        
        .theme-toggle-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--bg-container);
            color: var(--text-main);
            padding: 6px 10px;
            font-size: 0.8rem;
            border: 1px solid var(--accent);
            border-radius: 5px;
            cursor: pointer;
            z-index: 100;
        }

        .dropbtn {
            background: var(--bg-container);
            color: var(--text-main);
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: bold;
            border: 1px solid var(--accent);
            border-radius: 5px;
            cursor: pointer;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            left: 0;
            background-color: var(--bg-container);
            min-width: 90px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.2);
            border-radius: 5px;
            border: 1px solid var(--input-border);
            margin-top: 5px;
            overflow: hidden;
        }
        .dropdown-content button {
            color: var(--text-main);
            padding: 8px 12px;
            display: block;
            background: none;
            border: none;
            width: 100%;
            text-align: center;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .dropdown-content button:hover {
            background-color: rgba(197, 160, 89, 0.2);
        }
        .show { display: block; }

        .brand { text-align: center; }
        .brand h1 { color: var(--primary); margin: 0; font-size: 2.2rem; }
        
        input, select { width: 100%; padding: 12px; border: 2px solid var(--input-border); background: var(--input-bg); color: var(--text-main); border-radius: 10px; box-sizing: border-box; font-family: inherit; margin-bottom: 10px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 10px; transition: 0.3s; }
        .btn-start { background: #2c3e50; color: white; }
        .btn-reveal { background: var(--accent); color: white; }
        .btn-correct { background: var(--success); color: white; }
        .btn-wrong { background: #e74c3c; color: white; }
        
        #timer-container { width: 100%; height: 10px; background: #eee; border-radius: 5px; margin-bottom: 15px; overflow: hidden; display: none; }
        #timer-bar { width: 100%; height: 100%; background: var(--accent); transition: width 1s linear; }

        .settings-box { background: rgba(0,0,0,0.05); padding: 15px; border-radius: 15px; margin: 15px 0; display: flex; flex-wrap: wrap; gap: 20px; align-items: center; justify-content: center; }
        
        .switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input { 
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--success);
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }
        body[lang="ar"] input:checked + .slider:before {
            transform: translateX(-20px);
        }
        body[lang="ar"] .slider:before {
            left: auto;
            right: 3px;
        }

        #quiz-section, #result-section { display: none; text-align: center; }
        .answer-box { background: rgba(197, 160, 89, 0.1); border-right: 6px solid var(--accent); padding: 20px; margin-top: 20px; display: none; text-align: right; border-radius: 10px; }
        .eval-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        
        body[lang="id"], body[lang="en"] { direction: ltr; text-align: left; }
body[lang="ar"] { direction: rtl; text-align: right; }
body[lang="id"] .answer-box, body[lang="en"] .answer-box {
    border-right: none;
    border-left: 6px solid var(--accent);
    text-align: left;
}

body.dark-mode .settings-box {
    background: rgba(255,255,255,0.05);
}

body.dark-mode .answer-box {
    background: rgba(216, 179, 106, 0.12);
}

body.dark-mode #q-text,
body.dark-mode #display-maddah-name,
body.dark-mode .brand h1,
body.dark-mode .answer-box,
body.dark-mode .answer-box p,
body.dark-mode .answer-box strong {
    color: #ffffff !important;
    font-weight: bold;
}

</style>

    </style>
</head>
<body lang="ar">

<div id="setup-section" class="container">
    <div class="header-wrapper">
        <div class="lang-dropdown">
            <button onclick="toggleLangMenu()" class="dropbtn" id="current-lang-btn">🌐 AR</button>
            <div id="langDropdown" class="dropdown-content">
                <button onclick="changeLang('id')">ID</button>
                <button onclick="changeLang('en')">EN</button>
                <button onclick="changeLang('ar')">AR</button>
            </div>
        </div>
        
        <button class="theme-toggle-btn" id="dark-toggle" onclick="toggleDarkMode()">🌙</button>

        <div class="brand">
            <h1 id="txt-title">امتياز</h1>
            <p id="txt-subtitle">Platform Murojaah Mandiri</p>
        </div>
    </div>
    
    <div style="text-align: center; background: rgba(197, 160, 89, 0.05); padding: 20px; border-radius: 15px; margin-bottom: 15px;">
        <span id="txt-fixed-label" style="font-size: 0.9rem; opacity: 0.7;">المادة الحالية / Maddah:</span>
        <h2 id="display-maddah-name" style="margin: 5px 0 0 0; color: var(--primary); font-size: 1.6rem;">...</h2>
    </div>
    
    <div class="settings-box">
        <div class="switch-container" onclick="document.getElementById('timer-toggle').click();">
            <span id="txt-timer-on" style="font-weight: bold;">تفعيل المؤقت</span>
            <label class="switch" onclick="event.stopPropagation();">
                <input type="checkbox" id="timer-toggle" checked>
                <span class="slider"></span>
            </label>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span id="txt-timer-sec">المدة (ثانية):</span>
            <input type="number" id="timer-duration" value="30" min="5" style="width: 70px; margin: 0; padding: 5px;">
        </div>
    </div>

    <div style="text-align: center;">
        <p id="count-info" style="font-weight: bold; font-size: 1.1rem; margin-bottom: 15px;">...</p>
        <button id="start-btn" class="btn btn-start" onclick="startQuiz()">ابدأ التدريب</button>
    </div>
</div>

<div id="quiz-section" class="container">
    <div id="timer-container"><div id="timer-bar"></div></div>
    <p id="progress"></p>
    <h2 id="q-text" style="line-height: 1.6; min-height: 60px; color: var(--primary);"></h2>
    <button id="reveal-btn" class="btn btn-reveal" onclick="revealAnswer()">إظهار الإجابة</button>
    <div id="answer-container" class="answer-box"><strong id="txt-label-ans">الإجابة الشارحة:</strong><p id="a-text" style="font-size: 1.1rem; margin-top: 10px; line-height: 1.6; white-space: pre-line;"></p></div>
    <div id="eval-section" class="eval-btns" style="display:none;">
        <button class="btn btn-wrong" id="txt-btn-wrong" onclick="processResult(false)">نسيت</button>
        <button class="btn btn-correct" id="txt-btn-correct" onclick="processResult(true)">حفظت</button>
    </div>
</div>

<div id="result-section" class="container">
    <h2 id="txt-res-title">النتيجة النهائية</h2>
    <p id="score-text" style="font-size: 3rem; font-weight: bold; color: var(--primary);"></p>
    <button class="btn btn-start" id="txt-btn-restart" onclick="location.reload()">العودة</button>
</div>

    function toggleLangMenu() {
        document.getElementById("langDropdown").classList.toggle("show");
    }

    function changeLang(lang) {
        setLang(lang);
        document.getElementById("current-lang-btn").innerText = "🌐 " + lang.toUpperCase();
        document.getElementById("langDropdown").classList.remove("show");
    }

    window.addEventListener('click', function(event) {
        if (!event.target.matches('.dropbtn')) {
            const dropdowns = document.getElementsByClassName("dropdown-content");
            for (let i = 0; i < dropdowns.length; i++) {
                const openDropdown = dropdowns[i];
                if (openDropdown.classList.contains('show')) {
                    openDropdown.classList.remove('show');
                }
            }
        }
    });

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        localStorage.setItem('thoriqDarkMode', isDark);
        document.getElementById('dark-toggle').innerText = isDark ? '☀️' : '🌙';
    }

    function setLang(lang) {
        document.body.setAttribute('lang', lang);
        const t = i18n[lang];
        document.getElementById('txt-subtitle').innerText = t.subtitle;
        document.getElementById('txt-fixed-label').innerText = t.fixedLabel;
        document.getElementById('start-btn').innerText = t.btnStart;
        document.getElementById('reveal-btn').innerText = t.btnReveal;
        document.getElementById('txt-label-ans').innerText = t.lAns;
        document.getElementById('txt-btn-wrong').innerText = t.btnWrong;
        document.getElementById('txt-btn-correct').innerText = t.btnCorrect;
        document.getElementById('txt-res-title').innerText = t.resTitle;
        document.getElementById('txt-btn-restart').innerText = t.btnRestart;
        document.getElementById('txt-timer-on').innerText = t.tOn;
        document.getElementById('txt-timer-sec').innerText = t.tSec;
        
        document.getElementById('count-info').innerText = t.countMsg(DAFTAR_SOAL.length);
    }

    let currentQuestions = [], currentIdx = 0, score = 0, timerInterval;

    function startTimer() {
        const isTimerOn = document.getElementById('timer-toggle').checked;
        const duration = parseInt(document.getElementById('timer-duration').value) || 30;
        if (!isTimerOn) { document.getElementById('timer-container').style.display = 'none'; return; }

        let timeLeft = duration;
        document.getElementById('timer-container').style.display = 'block';
        const bar = document.getElementById('timer-bar');
        bar.style.transition = 'none'; bar.style.width = "100%"; bar.style.background = "var(--accent)";
        setTimeout(() => { bar.style.transition = 'width 1s linear'; }, 50);

        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            const width = (timeLeft / duration) * 100;
            bar.style.width = width + "%";
            if (timeLeft <= 5) bar.style.background = "#e74c3c";
            if (timeLeft <= 0) { clearInterval(timerInterval); revealAnswer(); }
        }, 1000);
    }

    function startQuiz() {
        currentQuestions = [...DAFTAR_SOAL].sort(() => Math.random() - 0.5);
        currentIdx = 0; score = 0;
        document.getElementById('setup-section').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        const data = currentQuestions[currentIdx];
        document.getElementById('progress').innerText = `${currentIdx + 1} / ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('a-text').innerText = data.a;
        document.getElementById('answer-container').style.display = 'none';
        document.getElementById('eval-section').style.display = 'none';
        document.getElementById('reveal-btn').style.display = 'block';
        startTimer();
    }

    function revealAnswer() {
        clearInterval(timerInterval);
        document.getElementById('answer-container').style.display = 'block';
        document.getElementById('eval-section').style.display = 'grid';
        document.getElementById('reveal-btn').style.display = 'none';
    }

    function processResult(isCorrect) {
        if(isCorrect) score++;
        currentIdx++;
        if(currentIdx < currentQuestions.length) showQuestion();
        else {
            document.getElementById('quiz-section').style.display = 'none';
            document.getElementById('result-section').style.display = 'block';
            document.getElementById('score-text').innerText = `${score} / ${currentQuestions.length}`;
        }
    }

    window.onload = () => {
        if (localStorage.getItem('thoriqDarkMode') === 'true') {
            document.body.classList.add('dark-mode');
            document.getElementById('dark-toggle').innerText = '☀️';
        }
        document.getElementById('display-maddah-name').innerText = NAMA_MADDAH;
        setLang('ar');
    };
